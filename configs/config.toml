lanip = ''
serverid = ''
wanip = ''

[base]
disabledcaptcha = true
jwtsecret = ''
timeout = 0

[baselog]
dir = './logs'
level = 'info'
maxage = 2678400
rotationsize = 50
rotationtime = 28800

[data]
# 之前是 dsn = './configs/data.db'
# 这里的 db 是你在 docker-compose.yml 中定义的 MySQL 服务名
# dsn = "root:92acf52f75c18e15@tcp(db:3306)/easydarwin?charset=utf8&parseTime=True&loc=Local"
dsn = "root:92acf52f75c18e15@tcp(127.0.0.1:3306)/easydarwin?charset=utf8&parseTime=True&loc=Local"
connmaxlifetime = 21600
maxidleconns = 1
maxopenconns = 5  # MySQL 环境下可以适当调大
slowthreshold = 200

[defaulthttpconfig]
httplistenaddr = ':10086'
httpscertfile = './configs/cert.pem'
httpskeyfile = './configs/key.pem'
httpslistenaddr = ''

[lalconfig]
httplistenaddr = ":8080"
httpslistenaddr = ""
httpscertfile = "./conf/cert.pem"
httpskeyfile = "./conf/key.pem"

[gopcacheconfig]
gopnum = 0
singlegopmaxframenum = 200

[hlsconfig]
boundarybyvideo = true
cleanupmode = 2
deletethreshold = 2
enable = true
enablehttps = false
fragmentdurationms = 6000
fragmentnum = 5
outpath = './stream/hls/'
subsessionhashkey = ''
subsessiontimeoutms = 20000
urlpattern = '/hls/'
usem3u8memoryflag = false
usememoryasdiskflag = false

[hlsconfig.fmp4]
enable = false
enablehttps = false
urlpattern = '/hls/m4s/*streamname'

[httpapiconfig]
enable = true

[httpflvconfig]
enable = true
enablehttps = false
urlpattern = '/'

[httpfmp4config]
enable = false
enablehttps = false
urlpattern = '/m4s/live/:streamname.mp4'

[httptsconfig]
enable = false
enablehttps = false
urlpattern = '/ts/live/:streamname'

[insessionconfig]
adddummyaudioenable = true
adddummyaudiowaitaudioms = 150

[logconfig]
assertbehavior = 1
filename = './logs/sugar.log'
isrotatedaily = true
istostdout = true
level = 4
levelflag = true
shortfileflag = true
timestampflag = true
timestampwithmsflag = true

[recordconfig]
enableflv = false
enablefmp4 = false
enablempegts = false
flvoutpath = './streamsvr_record/flv/'
fmp4outpath = './streamsvr_record/fmp4'
mpegtsoutpath = './r/'

[relaypush]
addrlist = []
enable = false

[roomconfig]
apikey = 'admin@admin'
apisecret = 'admin@admin'
enable = true

[rtcconfig]
enable = false
enablehttps = true
icehostnattoips = ['127.0.0.1']
icetcpmuxport = 24888
iceudpmuxport = 24888
pubtimeoutsec = 10
urlpattern = '/live/:streamname'

[rtmpconfig]
addr = ':21935'
enable = true
mergewritesize = 0
pubtimeoutsec = 0
pulltimeoutsec = 30
rtmpoverquicaddr = ':25935'
rtmpoverquicenable = true
rtmpsaddr = ':24935'
rtmpscertfile = './configs/cert.pem'
rtmpsenable = false
rtmpskeyfile = './configs/key.pem'

[rtspconfig]
addr = ':15544'
authenable = false
authmethod = 1
enable = true
outwaitkeyframeflag = true
password = 'admin'
pubtimeoutsec = 0
pulltimeoutsec = 30
rtspsaddr = ':5322'
rtspscertfile = './configs/cert.pem'
rtspsenable = false
rtspskeyfile = './configs/key.pem'
username = 'admin'
wsrtspaddr = ':25566'
wsrtspenable = true

[srtconfig]
addr = ':6000'
enable = false
encryptenable = false
encryptmode = 2
passphrase = 'streamsvr-password'
pubtimeoutsec = 0

[staticrelaypull]
addr = ''
enable = false

[storage]
bucket = ''
concurrency = 8
days = 3
diskusageratio = 85.95
enabledcloudstorage = false
endpoint = ''
format = 'mp4'
fragmentdurations = 20
key = ''
path = './r'
queuelength = 512
region = ''
retry = 0
secret = ''
timeout = 30000

[vodconfig]
dir = 'vod_data/vod'
srcdir = 'vod_data/vodsrc'
systrannumber = 3
progressnotifyurl = ""
hlstime = 8
opensquare = true
opendefinition = false
defaultdefinition = 'hd'
transdefinition = 'sd,hd,fhd'
transvideo = false
tranway = 'libx264'
tranhevcway = 'copy'
