name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ] # 当你向 master 分支提交代码时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 这里的镜像名会是 ghcr.io/你的用户名/easydarwin-custom:latest
          tags: ghcr.io/${{ github.repository_owner }}/easydarwin-custom:latest
